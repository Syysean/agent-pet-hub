<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <!-- Body gradient -->
    <radialGradient id="bodyGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FFB6C1"/>
      <stop offset="100%" stop-color="#FF69B4"/>
    </radialGradient>

    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000020"/>
    </filter>

    <!-- Eye highlight gradient -->
    <radialGradient id="eyeHighlight" cx="35%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </radialGradient>

    <!--腮红渐变 -->
    <radialGradient id="blush" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF69B4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FF69B4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 阴影 -->
  <ellipse cx="60" cy="105" rx="30" ry="8" fill="#00000015"/>

  <!-- 身体 -->
  <g filter="url(#shadow)">
    <!-- 身体主体 - 可爱的圆形 -->
    <circle cx="60" cy="60" r="42" fill="url(#bodyGrad)" stroke="#E7548A" stroke-width="1.5"/>

    <!-- 腮红 -->
    <circle cx="35" cy="68" r="10" fill="url(#blush)">
      <animate attributeName="opacity" values="0.6;0.8;0.6" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="85" cy="68" r="10" fill="url(#blush)">
      <animate attributeName="opacity" values="0.6;0.8;0.6" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 呼吸动画 - 身体微微缩放 -->
  <g>
    <animateTransform attributeName="transform" type="scale" values="1;1.015;1" dur="2.5s" repeatCount="indefinite" additive="sum"/>

    <!-- 左眼 -->
    <g transform="translate(42, 50)">
      <!-- 眼白 -->
      <ellipse cx="0" cy="0" rx="8" ry="9" fill="white"/>
      <!-- 虹膜 -->
      <ellipse cx="0" cy="0" rx="5" ry="6" fill="#2C1810"/>
      <!-- 高光 -->
      <circle cx="2" cy="-2" r="2.5" fill="white" opacity="0.9"/>
      <circle cx="-1" cy="1" r="1" fill="white" opacity="0.5"/>
      <!-- 眨眼动画 -->
      <ellipse cx="0" cy="0" rx="8" ry="9" fill="#FF69B4" opacity="0">
        <animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.95;0.97;0.99;1" dur="4s" repeatCount="indefinite"/>
      </ellipse>
    </g>

    <!-- 右眼 -->
    <g transform="translate(78, 50)">
      <!-- 眼白 -->
      <ellipse cx="0" cy="0" rx="8" ry="9" fill="white"/>
      <!-- 虹膜 -->
      <ellipse cx="0" cy="0" rx="5" ry="6" fill="#2C1810"/>
      <!-- 高光 -->
      <circle cx="2" cy="-2" r="2.5" fill="white" opacity="0.9"/>
      <circle cx="-1" cy="1" r="1" fill="white" opacity="0.5"/>
      <!-- 眨眼动画 -->
      <ellipse cx="0" cy="0" rx="8" ry="9" fill="#FF69B4" opacity="0">
        <animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.95;0.97;0.99;1" dur="4s" repeatCount="indefinite"/>
      </ellipse>
    </g>

    <!-- 嘴巴 - 微笑 -->
    <path d="M52 72 Q60 80 68 72" fill="none" stroke="#2C1810" stroke-width="2.5" stroke-linecap="round">
      <!-- 状态变化时嘴巴会变化（通过 CSS class 或 JS 控制） -->
    </path>

    <!-- 耳朵/触手装饰 -->
    <path d="M35 25 Q40 12 50 20" fill="none" stroke="#FF69B4" stroke-width="3" stroke-linecap="round">
      <animate attributeName="d" values="M35 25 Q40 12 50 20;M35 25 Q42 15 50 20;M35 25 Q40 12 50 20" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M85 25 Q80 12 70 20" fill="none" stroke="#FF69B4" stroke-width="3" stroke-linecap="round">
      <animate attributeName="d" values="M85 25 Q80 12 70 20;M85 25 Q78 15 70 20;M85 25 Q80 12 70 20" dur="2s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- 状态指示器 - working 状态光环 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0.5;0" dur="1.5s" repeatCount="indefinite" begin="0s"/>
    <circle cx="60" cy="60" r="44" fill="none" stroke="#4CAF50" stroke-width="2" stroke-dasharray="8 4">
      <animateTransform attributeName="transform" type="rotate" values="0 60 60;360 60 60" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- working 状态文字标签 (可选) -->
  <text x="60" y="110" text-anchor="middle" font-size="8" fill="#4CAF50" font-family="sans-serif" opacity="0">
    WORKING
  </text>

  <!-- error 状态 X 标记 -->
  <g opacity="0">
    <line x1="52" y1="64" x2="68" y2="80" stroke="#F44336" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="68" y1="64" x2="52" y2="80" stroke="#F44336" stroke-width="2.5" stroke-linecap="round"/>
  </g>
</svg>
